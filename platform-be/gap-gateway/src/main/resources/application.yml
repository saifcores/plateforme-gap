server:
  port: 8080

spring:
  application:
    name: gap-gateway
  cloud:
    gateway:
      routes:
        - id: identite-auth
          uri: ${GAP_MS_IDENTITE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/utilisateurs/**,/api/roles/**
        - id: pedagogie
          uri: ${GAP_MS_PEDAGOGIE_URL:http://localhost:8082}
          predicates:
            - Path=/api/formations/**,/api/formateurs/**,/api/etudiants/**
        - id: administration
          uri: ${GAP_MS_ADMINISTRATION_URL:http://localhost:8083}
          predicates:
            - Path=/api/courriers/**,/api/notes-service/**,/api/notes-administratives/**,/api/circulaires/**,/api/personnels/**,/api/budgets/**,/api/comptes-rendus/**,/api/notifications/**
        - id: insertion
          uri: ${GAP_MS_INSERTION_URL:http://localhost:8084}
          predicates:
            - Path=/api/insertions/**,/api/stages/**,/api/registre-contacts/**,/api/partenaires/**
        - id: document
          uri: ${GAP_MS_DOCUMENT_URL:http://localhost:8085}
          predicates:
            - Path=/api/documents/**,/api/journal-acces-documents/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
