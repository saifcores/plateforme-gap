server:
  port: 8085

spring:
  application:
    name: gap-ms-document
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gap_universite}
    username: ${DB_USER:gap}
    password: ${DB_PASSWORD:gap}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXNlY3JldC1rZXktZm9yLWdhcC11Y2hrLTIwMjUtbWluLTI1Ni1iaXRz}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
